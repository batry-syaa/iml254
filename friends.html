<div id="friendPopup" style="display:none; border:1px solid black; padding:30px; position:absolute; background:#E6D2B8;">
  <p id="friendInfo"></p>
  <button id="viewMoreBtn">View More</button>
  <button onclick="closePopup()">Close</button>
</div>

<script>
const popup = document.getElementById('friendPopup');
const friendInfo = document.getElementById('friendInfo');
const viewMoreBtn = document.getElementById('viewMoreBtn');

let selectedFriendPage = '';

function showFriend(friendName, friendPage, imgElement) {
const rect = imgElement.getBoundingClientRect();

  
popup.style.top = (rect.top + window.scrollY) + 'px';
popup.style.left = (rect.left + window.scrollX) + 'px';

popup.style.width = '200px';
popup.style.padding = '8px'; 
popup.style.backgroundColor = '#E6D2B8'; 
popup.style.border = '1px solid black';
popup.style.borderRadius = '8px';
popup.style.boxShadow = '0 4px 8px rgba(0,0,0,0.2)';

  friendInfo.textContent = friendName;
  selectedFriendPage = friendPage;
  viewMoreBtn.onclick = function() {
    window.location.href = selectedFriendPage;
  };
  popup.style.display = 'block';
}
function closePopup() {
  popup.style.display = 'none';
}
</script>
